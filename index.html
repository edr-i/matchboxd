<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matchboxd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <style>
    :root {
      --accent:  #ff8000;
      --green:   #00e054;
      --lb-blue: #40bcf4;
      --black:   #0a0a0a;
      --white:   #f0ede6;
      --border:  3px solid #0a0a0a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--white);
      color: var(--black);
      font-family: 'Barlow Condensed', sans-serif;
      min-height: 100vh;
      cursor: default;
      padding: 2rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── STARTUP OVERLAY ── */
    #startup-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: var(--white);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.2rem;
    }
    #startup-overlay.hidden { display: none; }
    .startup-title {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 700; text-transform: uppercase; letter-spacing: -0.02em;
    }
    .startup-title .o { color: var(--accent); }
    .startup-title .b { color: var(--accent); }
    #startup-msg {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 0.15em; color: #555;
    }
    .prog-wrap { width: 260px; height: 4px; background: #ddd; overflow: hidden; }
    .prog-inner { height: 100%; background: var(--accent); animation: indeterminate 1.4s infinite; }
    @keyframes indeterminate {
      0%   { transform: translateX(-100%) scaleX(0.4); }
      50%  { transform: translateX(60%)   scaleX(0.6); }
      100% { transform: translateX(200%)  scaleX(0.4); }
    }

    /* ── PAGE ── */
    .page { width: 100%; max-width: 560px; display: flex; flex-direction: column; align-items: center; }

    /* ── HEADER ── */
    header { text-align: center; margin-bottom: 2rem; }
    .site-title {
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 700; text-transform: uppercase;
      letter-spacing: -0.02em; line-height: 0.92;
    }
    .site-title .o { color: var(--accent); transition: color 0.2s; }
    .site-title .b { color: var(--accent); }
    /* ── MODE SWITCH ── */
    .mode-switch {
      display: flex; width: 100%;
      border-bottom: var(--border);
    }
    .mode-btn {
      flex: 1; padding: 0.6rem 1rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      background: var(--white); color: #999;
      border: none; cursor: pointer;
      transition: background 0.15s, color 0.15s;
      outline: none;
    }
    .mode-btn:first-child { border-right: var(--border); }
    .mode-btn.active { background: var(--accent); color: var(--white); }
    body.blend-mode .mode-btn.active { background: var(--green); color: var(--black); }

    /* ── FORM ── */
    .form {
      border: none;
      padding: 1.5rem;
      background: var(--white);
      width: 100%;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .form-wrap {
      width: 100%;
      border: var(--border);
      box-shadow: 5px 5px 0 var(--black);
      margin-bottom: 2rem;
    }
    .form-row { display: flex; gap: 1rem; }
    .form-row .form-group { flex: 1; }
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem; text-transform: uppercase;
      letter-spacing: 0.15em; color: #555;
    }
    .input-prefix-wrap {
      display: flex; border: var(--border); background: var(--white);
    }
    .input-prefix-wrap:focus-within { outline: 2px solid var(--accent); outline-offset: -2px; }
    body.blend-mode .input-prefix-wrap:focus-within { outline-color: var(--green); }
    .input-at {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; padding: 0.5rem 0 0.5rem 0.75rem;
      color: #999; user-select: none; line-height: 1;
    }
    .form-input-user {
      flex: 1; border: none; outline: none;
      padding: 0.5rem 0.75rem 0.5rem 0.2rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; background: transparent;
    }
    .form-input, .form-select {
      border: var(--border); padding: 0.5rem 0.75rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; background: var(--white);
      outline: none; width: 100%;
    }
    .form-input:focus, .form-select:focus { outline: 2px solid var(--accent); outline-offset: -2px; }
    body.blend-mode .form-input:focus,
    body.blend-mode .form-select:focus { outline-color: var(--green); }
    option { background: var(--white); }
    #user2-group { display: none; }

    /* ── ALGO EXPLAINER ── */
    .algo-explainer {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem; color: #777;
      line-height: 1.7; margin-top: 0.2rem;
      border-left: 3px solid #ddd;
      padding-left: 0.75rem;
    }
    .algo-explainer b { color: var(--black); }

    .btn-submit {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      background: var(--accent); color: var(--white);
      border: var(--border); padding: 0.65rem;
      box-shadow: 4px 4px 0 var(--black);
      cursor: pointer;
      transition: transform 0.08s, box-shadow 0.08s, background 0.2s;
    }
    body.blend-mode .btn-submit { background: var(--green); color: var(--black); }
    .btn-submit:hover  { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--black); }
    .btn-submit:active { transform: translate(4px,4px); box-shadow: none; }

    /* ── REQUEST PROGRESS ── */
    #req-progress {
      display: none; align-items: center; gap: 1rem;
      margin-bottom: 1.5rem; width: 100%;
      border: var(--border); padding: 0.75rem 1rem;
    }
    #req-progress.visible { display: flex; }
    .prog-wrap-sm { width: 60px; height: 3px; background: #ddd; overflow: hidden; flex-shrink: 0; }
    .prog-inner-sm { height: 100%; background: var(--accent); animation: indeterminate 1.2s infinite; }
    body.blend-mode .prog-inner-sm { background: var(--green); }
    #req-step {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #555;
    }

    #error {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem; color: #c0392b; margin-bottom: 1rem; width: 100%;
    }

    /* ── DECADE FILTER ── */
    #decade-filter, #genre-filter {
      display: none; align-items: center; gap: 0.75rem;
      flex-wrap: wrap; margin-bottom: 1rem; width: 100%;
    }
    #decade-filter.visible, #genre-filter.visible { display: flex; }
    .filter-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem; text-transform: uppercase;
      letter-spacing: 0.15em; color: #555;
    }
    .decade-btns { display: flex; flex-wrap: wrap; }
    .decade-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      border: var(--border); margin-right: -3px;
      padding: 0.25rem 0.65rem;
      background: var(--white); color: #999;
      cursor: pointer; transition: background 0.1s, color 0.1s;
    }
    .decade-btn.active { background: var(--lb-blue); color: var(--black); }

    /* ── SECTION TITLE ── */
    .section-title {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 700; text-transform: uppercase;
      letter-spacing: -0.01em;
      margin: 2rem 0 1rem;
      display: flex; align-items: baseline; gap: 0.75rem;
    }
    .section-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem; color: #555; font-weight: 400; letter-spacing: 0.1em;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1.2rem;
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.75rem; }
    }

    /* ── CARD ── */
    .card { display: flex; flex-direction: column; border: var(--border); box-shadow: 4px 4px 0 var(--black); }
    .card.filtered { display: none; }
    .card-poster {
      border-bottom: var(--border);
      aspect-ratio: 2/3; overflow: hidden;
      position: relative; background: #ddd;
    }
    .card-poster a { display: block; width: 100%; height: 100%; }
    .card-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-no-poster {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem; color: #999; text-align: center; padding: 0.5rem;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .card-rank {
      position: absolute; top: 0; left: 0;
      font-size: 0.85rem; font-weight: 700;
      background: var(--black); color: var(--white);
      padding: 2px 6px; line-height: 1.4;
    }
    .card-label {
      position: absolute; top: 26px; left: 0;
      background: var(--lb-blue); color: var(--black);
      font-family: 'Space Mono', monospace;
      font-size: 0.44rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 1px 5px; line-height: 1.4;
      display: none;
    }
    .card-label.visible { display: block; }
    .wl-badge {
      position: absolute; top: 0; right: 0;
      font-family: 'Space Mono', monospace;
      font-size: 0.5rem; font-weight: 700;
      padding: 2px 5px; text-transform: uppercase;
      letter-spacing: 0.06em; line-height: 1.4;
    }
    .wl-orange { background: var(--accent); color: var(--white); }
    .wl-green  { background: var(--green);  color: var(--black); }

    .card-because {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(10,10,10,0.88);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      font-size: 0.47rem; text-transform: uppercase; letter-spacing: 0.05em;
      padding: 0.35rem 0.45rem; line-height: 1.5;
      opacity: 0; visibility: hidden;
      transition: opacity 0.18s ease, visibility 0.18s ease;
      pointer-events: none;
    }
    @media (hover: hover) {
      .card-poster:hover .card-because { opacity: 1; visibility: visible; }
    }

    .card-body { padding: 0.55rem 0.6rem; }
    .card-title { font-size: 0.95rem; font-weight: 700; text-transform: uppercase; line-height: 1.2; }
    .card-title a { color: var(--black); text-decoration: none; }
    .card-title a:hover { color: var(--accent); }
    .card-meta {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem; color: #555; margin-top: 0.05rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-score {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem; color: #555; margin-top: 0.3rem;
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 4rem;
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
    }
    .footer-note {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem; text-transform: uppercase;
      letter-spacing: 0.15em; color: #aaa;
    }
    /* ── EXPORT BUTTON (in results) ── */
    .btn-export {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; background: var(--black); color: var(--white);
      border: 2px solid var(--black); padding: 0.3rem 1rem;
      box-shadow: 3px 3px 0 #888; cursor: pointer;
      transition: transform 0.08s, box-shadow 0.08s;
      flex-shrink: 0;
    }
    .btn-export:hover  { transform: translate(1px,1px); box-shadow: 2px 2px 0 #888; }
    .btn-export:active { transform: translate(3px,3px); box-shadow: none; }

    /* ── EXPORT OVERLAY ── */
    #export-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.92); overflow-y: auto;
    }
    #export-overlay.visible { display: block; }

    .export-controls {
      position: sticky; top: 0; z-index: 501;
      display: flex; justify-content: center; gap: 0.5rem;
      padding: 0.75rem 1rem; background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
    }
    .export-ctrl-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; background: transparent; color: #f0ede6;
      border: 2px solid #f0ede6; padding: 0.35rem 1.1rem;
      cursor: pointer; transition: background 0.1s, color 0.1s;
    }
    .export-ctrl-btn:hover { background: #f0ede6; color: #0a0a0a; }
    .export-ctrl-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── EXPORT CARD (the shareable design) ── */
    .export-card {
      width: 760px; max-width: 96%;
      margin: 1.5rem auto 3rem;
      background: #f0ede6; color: #0a0a0a;
      padding: 36px 36px 28px;
      box-sizing: border-box;
      font-family: 'Barlow Condensed', sans-serif;
    }
    .export-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      border-bottom: 3px solid #0a0a0a;
      padding-bottom: 14px; margin-bottom: 22px;
    }
    .export-logo {
      font-size: 2.8rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: -0.02em; line-height: 1;
    }
    .export-header-right { text-align: right; }
    .export-badge {
      font-family: 'Space Mono', monospace; font-size: 0.55rem;
      text-transform: uppercase; letter-spacing: 0.15em;
      padding: 2px 8px; display: inline-block;
    }
    .export-subtitle {
      font-family: 'Space Mono', monospace; font-size: 0.58rem;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: #555; margin-top: 5px;
    }
    .export-grid {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;
      margin-bottom: 22px;
    }
    .export-film { display: flex; flex-direction: column; }
    .export-poster {
      position: relative; aspect-ratio: 2/3;
      border: 2px solid #0a0a0a; overflow: hidden; background: #ccc;
    }
    .export-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .export-no-poster {
      width: 100%; height: 100%; display: flex; align-items: center;
      justify-content: center; font-family: 'Space Mono', monospace;
      font-size: 0.45rem; color: #888; text-align: center; padding: 4px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .export-rank {
      position: absolute; top: 0; left: 0;
      background: #0a0a0a; color: #f0ede6;
      font-size: 0.7rem; font-weight: 700; padding: 1px 5px; line-height: 1.5;
    }
    .export-wl {
      position: absolute; top: 0; right: 0;
      font-family: 'Space Mono', monospace; font-size: 0.42rem; font-weight: 700;
      padding: 1px 4px; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1.5;
    }
    .export-wl-orange { background: #ff8000; color: #fff; }
    .export-wl-green  { background: #00e054; color: #0a0a0a; }
    .export-film-title {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      line-height: 1.2; margin-top: 5px;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical;
    }
    .export-film-meta {
      font-family: 'Space Mono', monospace; font-size: 0.5rem;
      color: #666; margin-top: 2px;
    }
    .export-footer {
      border-top: 2px solid #0a0a0a; padding-top: 10px;
      font-family: 'Space Mono', monospace; font-size: 0.5rem;
      text-transform: uppercase; letter-spacing: 0.12em; color: #999;
      display: flex; justify-content: space-between;
    }

    /* ── PROFILE CARD ── */
    #profile { display: none; margin-bottom: 1.5rem; }
    #profile.visible { display: block; }
    .profile-wrap {
      display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
    }
    .profile-card {
      flex: 0 1 600px; min-width: 280px;
      border: var(--border);
      padding: 0.65rem 0.9rem;
      background: var(--white);
      box-shadow: 4px 4px 0 var(--black);
    }
    /* blend layout */
    .blend-layout {
      display: grid; grid-template-columns: 1fr auto; gap: 1rem; align-items: stretch;
    }
    .blend-profiles-col { display: flex; flex-direction: column; gap: 1rem; }
    .blend-profiles-col .profile-card { flex: none; width: 100%; }
    .blend-score-card {
      width: 170px;
      border: var(--border);
      box-shadow: 4px 4px 0 var(--black);
      padding: 0.9rem; background: var(--white);
      display: flex; flex-direction: column; gap: 0.55rem; align-items: flex-start;
    }
    .blend-score-label {
      font-family: 'Space Mono', monospace; font-size: 0.5rem;
      text-transform: uppercase; letter-spacing: 0.15em; color: #999;
    }
    .blend-score-main {
      display: flex; flex-direction: column; gap: 0.55rem; width: 100%;
    }
    .blend-score-left { display: flex; flex-direction: column; }
    .blend-score-number {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      font-size: 5rem; line-height: 1; letter-spacing: -0.03em;
    }
    .blend-score-denom {
      font-family: 'Space Mono', monospace; font-size: 0.6rem; color: #555; margin-top: -0.3rem;
    }
    .blend-score-right {
      display: flex; flex-direction: column; gap: 0.45rem; width: 100%;
      border-top: var(--border); padding-top: 0.5rem;
    }
    .blend-score-shared-label {
      font-family: 'Space Mono', monospace; font-size: 0.48rem;
      text-transform: uppercase; letter-spacing: 0.12em; color: #999;
    }
    .blend-score-shared { display: flex; flex-wrap: wrap; gap: 3px; }
    .blend-score-tag {
      font-family: 'Space Mono', monospace; font-size: 0.48rem;
      text-transform: uppercase; letter-spacing: 0.06em;
      background: var(--green); color: var(--black); padding: 2px 5px;
    }
    .blend-score-stat-row {
      font-family: 'Space Mono', monospace; font-size: 0.52rem;
      text-transform: uppercase; letter-spacing: 0.05em; color: #444;
      display: flex; justify-content: space-between; line-height: 1.8;
    }
    .blend-score-stat-label { color: #999; }
    .blend-score-flavor {
      font-family: 'Space Mono', monospace; font-size: 0.52rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em; color: #222;
      border-top: var(--border); padding-top: 0.45rem; width: 100%;
    }
    .blend-score-method {
      font-family: 'Space Mono', monospace; font-size: 0.44rem;
      text-transform: uppercase; letter-spacing: 0.04em; color: #bbb;
      line-height: 1.5; width: 100%;
    }
    .profile-username {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: -0.01em; line-height: 1;
      border-bottom: var(--border);
      padding-bottom: 0.4rem; margin-bottom: 0.7rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .profile-filmcount {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem; color: #555; text-transform: uppercase; letter-spacing: 0.1em;
    }
    .profile-body {
      display: flex; gap: 0.9rem; align-items: flex-start;
    }
    .profile-left { flex: 1; min-width: 0; }
    .profile-favs {
      display: grid; grid-template-columns: repeat(4, 52px); gap: 3px;
      flex-shrink: 0; align-self: center;
    }
    .profile-fav {
      width: 52px; aspect-ratio: 2/3; overflow: hidden; background: #ccc;
      border: 1px solid #bbb;
    }
    .profile-fav img { width: 100%; height: 100%; object-fit: cover; display: block; }
    @media (max-width: 480px) {
      .form-row { flex-direction: column; }
      .profile-body { flex-direction: column; }
      .profile-favs { grid-template-columns: repeat(4, 56px); gap: 3px; width: auto; align-self: flex-start; }
      .profile-fav  { width: 56px; }
      .blend-layout { grid-template-columns: 1fr; }
      .blend-score-card { width: 100%; }
      .blend-score-main { flex-direction: row; align-items: flex-start; gap: 1rem; }
      .blend-score-left { min-width: 72px; }
      .blend-score-right { border-top: none; padding-top: 0; border-left: var(--border); padding-left: 1rem; }
      .blend-score-number { font-size: 3.2rem; }
      .blend-score-method { display: none; }
    }
    .profile-genres {
      display: flex; flex-wrap: wrap; gap: 0.25rem; margin-bottom: 0.45rem;
    }
    .profile-genre-tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.08em;
      background: var(--black); color: var(--white);
      padding: 2px 7px;
    }
    .profile-stats {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem; color: #444; text-transform: uppercase;
      letter-spacing: 0.06em; line-height: 1.65;
    }
    .profile-stat-row { display: flex; gap: 0.5rem; }
    .profile-stat-label { color: #999; }
  </style>
</head>
<body>

<div id="startup-overlay">
  <div class="startup-title">match<span class="o">box</span><span class="b">d</span></div>
  <div class="prog-wrap"><div class="prog-inner"></div></div>
  <div id="startup-msg">Loading community model…</div>
</div>

<div class="page">
  <header>
    <div class="site-title">match<span class="o">box</span><span class="b">d</span></div>
  </header>

  <div class="form-wrap">
    <div class="mode-switch">
      <button class="mode-btn active" id="btn-single" onclick="setMode('single')">Single</button>
      <button class="mode-btn"        id="btn-blend"  onclick="setMode('blend')">Blend</button>
    </div>

    <div class="form">
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label class="form-label">Username</label>
          <div class="input-prefix-wrap">
            <span class="input-at">@</span>
            <input class="form-input-user" type="text" id="user1" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter') getRecommendations()">
          </div>
        </div>
        <div class="form-group" id="user2-group" style="flex:1">
          <label class="form-label">Second username</label>
          <div class="input-prefix-wrap">
            <span class="input-at">@</span>
            <input class="form-input-user" type="text" id="user2" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter') getRecommendations()">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Algorithm</label>
        <select class="form-select" id="algo-mode" onchange="updateExplainer()">
          <option value="hybrid">Hybrid (recommended)</option>
          <option value="cf">Collaborative Filtering</option>
          </select>
        <div class="algo-explainer" id="algo-explainer"></div>
      </div>

      <button class="btn-submit" onclick="getRecommendations()">Get Recommendations</button>
    </div>
  </div>
</div>

<div style="width:100%;max-width:1100px">
  <div id="error"></div>

  <div id="profile"></div>

  <div id="req-progress">
    <div class="prog-wrap-sm"><div class="prog-inner-sm"></div></div>
    <div id="req-step">Starting…</div>
  </div>

  <div id="decade-filter">
    <span class="filter-label">Decade</span>
    <div class="decade-btns" id="decade-btns"></div>
  </div>

  <div id="genre-filter">
    <span class="filter-label">Genre</span>
    <div class="decade-btns" id="genre-btns"></div>
  </div>

  <div id="results"></div>

  <footer>
    <div style="transform:scale(0.75);transform-origin:center">
    <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="edri" data-color="#40bcf4" data-emoji="" data-font="Cookie" data-text="Buy me a coffee" data-outline-color="#000000" data-font-color="#000000" data-coffee-color="#FFDD00"></script>
    </div>
    <div class="footer-note">made with ♡ by <a href="https://kopliku.dev" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:none">kopliku.dev</a></div>
  </footer>
</div>

<div id="export-overlay"></div>

<script>
  const API = "";
  let activeDecades = new Set();
  let activeGenres  = new Set();

  const EXPLAINERS = {
    hybrid:  "Hybrid combines community taste patterns with your film preferences. Best results for most users.",
    cf:      "Collaborative Filtering finds people with similar taste and recommends what they loved. Works best with 100+ ratings.",
  };

  function updateExplainer() {
    const mode = document.getElementById("algo-mode").value;
    document.getElementById("algo-explainer").innerHTML = EXPLAINERS[mode] || "";
  }
  updateExplainer();

  async function pollStartup() {
    const overlay = document.getElementById("startup-overlay");
    const msg     = document.getElementById("startup-msg");
    // If already ready on first check, hide immediately
    for (let attempt = 0; attempt < 300; attempt++) {
      try {
        const r = await fetch(`${API}/startup-status`);
        if (!r.ok) throw new Error();
        const d = await r.json();
        msg.textContent = d.message || "Loading…";
        if (d.ready === true) {
          overlay.style.display = "none";
          return;
        }
      } catch (e) {
        msg.textContent = attempt === 0 ? "Connecting to server…" : msg.textContent;
      }
      await new Promise(res => setTimeout(res, 1000));
    }
  }
  pollStartup();

  function setMode(mode) {
    const isBlend = mode === "blend";
    document.getElementById("btn-single").classList.toggle("active", !isBlend);
    document.getElementById("btn-blend").classList.toggle("active",  isBlend);
    document.getElementById("user2-group").style.display = isBlend ? "flex" : "none";
    document.body.classList.toggle("blend-mode", isBlend);
  }

  function buildDecadeFilter(films) {
    const decades = new Set();
    films.forEach(f => { if (f.year) decades.add(Math.floor(f.year / 10) * 10); });
    const sorted = [...decades].sort();
    if (sorted.length < 2) return;
    const container = document.getElementById("decade-btns");
    container.innerHTML = "";
    activeDecades = new Set();
    sorted.forEach(d => {
      const btn = document.createElement("button");
      btn.className = "decade-btn";
      btn.textContent = d + "s";
      btn.dataset.decade = d;
      btn.onclick = () => {
        if (activeDecades.has(d)) {
          activeDecades.delete(d);
          btn.classList.remove("active");
        } else {
          activeDecades.add(d);
          btn.classList.add("active");
        }
        applyFilters();
      };
      container.appendChild(btn);
    });
    document.getElementById("decade-filter").classList.add("visible");
  }

  function buildGenreFilter(films) {
    const count = {};
    films.forEach(f => { (f.genres || []).forEach(g => { count[g] = (count[g] || 0) + 1; }); });
    const sorted = Object.keys(count).filter(g => count[g] >= 3).sort();
    if (sorted.length < 2) return;
    const container = document.getElementById("genre-btns");
    container.innerHTML = "";
    activeGenres = new Set();
    sorted.forEach(g => {
      const btn = document.createElement("button");
      btn.className = "decade-btn";
      btn.textContent = g;
      btn.dataset.genre = g;
      btn.onclick = () => {
        if (activeGenres.has(g)) {
          activeGenres.delete(g);
          btn.classList.remove("active");
        } else {
          activeGenres.add(g);
          btn.classList.add("active");
        }
        applyFilters();
      };
      container.appendChild(btn);
    });
    document.getElementById("genre-filter").classList.add("visible");
  }

  function applyFilters() {
    document.querySelectorAll(".card[data-year]").forEach(card => {
      const decade     = Math.floor(parseInt(card.dataset.year) / 10) * 10;
      const cardGenres = card.dataset.genres ? card.dataset.genres.split(",") : [];
      const passDecade = activeDecades.size === 0 || activeDecades.has(decade);
      const passGenre  = activeGenres.size === 0 || cardGenres.some(g => activeGenres.has(g));
      card.classList.toggle("filtered", !passDecade || !passGenre);

      const label = card.querySelector(".card-label");
      if (label) {
        const lines = [];
        const genreMatches = cardGenres.filter(g => activeGenres.has(g));
        if (activeGenres.size > 0 && genreMatches.length > 0) lines.push(genreMatches.join(" · "));
        if (activeDecades.size > 0 && activeDecades.has(decade)) lines.push(decade + "s");
        label.innerHTML = lines.join("<br>");
        label.classList.toggle("visible", lines.length > 0);
      }
    });
  }

  async function getRecommendations() {
    const user1   = document.getElementById("user1").value.trim();
    const user2   = document.getElementById("user2").value.trim();
    const isBlend = document.body.classList.contains("blend-mode");
    const mode    = document.getElementById("algo-mode").value;

    document.getElementById("error").textContent = "";
    document.getElementById("results").innerHTML = "";
    document.getElementById("decade-filter").classList.remove("visible");
    document.getElementById("genre-filter").classList.remove("visible");
    const profileEl = document.getElementById("profile");
    if (profileEl) { profileEl.innerHTML = ""; profileEl.classList.remove("visible"); }

    if (!user1) { document.getElementById("error").textContent = "Please enter a username."; return; }
    if (isBlend && !user2) { document.getElementById("error").textContent = "Please enter a second username."; return; }

    const progress = document.getElementById("req-progress");
    progress.classList.add("visible");
    document.getElementById("req-step").textContent = "Starting…";

    const body = { user1, user2: isBlend ? user2 : null, mode, top: 50, decades: null };

    try {
      const res = await fetch(`${API}/recommend-stream`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || res.statusText);
      }
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "", result = null;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n"); buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const p = JSON.parse(line.slice(6));
          if      (p.type === "progress") document.getElementById("req-step").textContent = p.message;
          else if (p.type === "profile")  renderProfile(p.data);
          else if (p.type === "result")   result = p.data;
          else if (p.type === "error")    throw new Error(p.message);
        }
      }
      progress.classList.remove("visible");
      if (result) renderResults(result);
    } catch (e) {
      progress.classList.remove("visible");
      document.getElementById("error").textContent = `Error: ${e.message}`;
    }
  }

  function filmCard(film, rank, user1, user2, isBlend) {
    const title = film.title || film.slug;
    const year  = film.year  ? `(${film.year})` : "";
    const dir   = film.director || "";
    const score = film.final_score ? film.final_score.toFixed(2) : "";
    const lbUrl = `https://letterboxd.com/film/${film.slug}/`;

    let wlHtml = "";
    if (isBlend) {
      const both = film.in_both_wl || (film.in_wl1 && film.in_wl2);
      if (both)          wlHtml = `<div class="wl-badge wl-green">WL: ${user1} &amp; ${user2}</div>`;
      else if (film.in_wl1) wlHtml = `<div class="wl-badge wl-green">WL: ${user1}</div>`;
      else if (film.in_wl2) wlHtml = `<div class="wl-badge wl-green">WL: ${user2}</div>`;
    } else {
      if (film.in_watchlist || film.in_wl1) wlHtml = `<div class="wl-badge wl-orange">WL</div>`;
    }

    const img = film.poster_url
      ? `<img src="${film.poster_url}" alt="${title}" loading="lazy">`
      : `<div class="card-no-poster">${title}</div>`;

    return `
      <div class="card" data-year="${film.year || 0}" data-slug="${film.slug}" data-genres="${(film.genres || []).join(',')}">
        <div class="card-poster">
          <a href="${lbUrl}" target="_blank" rel="noopener noreferrer">
            ${img}
            ${rank != null ? `<div class="card-rank">#${rank}</div>` : ""}
            <div class="card-label"></div>
            ${wlHtml}
          </a>
          ${film.because ? `<div class="card-because">${film.because}</div>` : ""}
        </div>
        <div class="card-body">
          <div class="card-title"><a href="${lbUrl}" target="_blank" rel="noopener noreferrer">${title} ${year}</a></div>
          ${score ? `<div class="card-score">${score}</div>` : ""}
          ${dir   ? `<div class="card-meta">${dir}</div>`   : ""}
        </div>
      </div>`;
  }


  // ── EXPORT ──────────────────────────────────────────────────────────
  function openExport() {
    const data = window.__exportData;
    if (!data) return;
    const overlay = document.getElementById('export-overlay');
    overlay.innerHTML = buildExportHTML(data);
    overlay.classList.add('visible');
    document.body.style.overflow = 'hidden';
  }

  function closeExport() {
    document.getElementById('export-overlay').classList.remove('visible');
    document.body.style.overflow = '';
  }

  function buildExportHTML(data) {
    const u1 = data.user1, u2 = data.user2;
    const isBlend = !!u2;
    const label   = isBlend ? `${u1} + ${u2}` : u1;
    const accent  = isBlend ? '#00e054' : '#ff8000';
    const badgeFg = isBlend ? '#0a0a0a' : '#fff';
    const mode    = isBlend ? 'BLEND' : 'SINGLE';
    const films   = data.recommendations.slice(0, 36);
    const date    = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

    const cards = films.map((f, i) => {
      const title    = f.title || f.slug;
      const year     = f.year  ? ` (${f.year})` : '';
      const score    = f.final_score ? f.final_score.toFixed(2) : '';
      const proxyUrl = f.poster_url ? `${API}/img-proxy?url=${encodeURIComponent(f.poster_url)}` : '';
      const img      = proxyUrl
        ? `<img src="${proxyUrl}" alt="">`
        : `<div class="export-no-poster">${title}</div>`;

      let wl = '';
      if (isBlend) {
        const both = f.in_both_wl || (f.in_wl1 && f.in_wl2);
        if (both)          wl = `<div class="export-wl export-wl-green">WL: ${u1} &amp; ${u2}</div>`;
        else if (f.in_wl1) wl = `<div class="export-wl export-wl-green">WL: ${u1}</div>`;
        else if (f.in_wl2) wl = `<div class="export-wl export-wl-green">WL: ${u2}</div>`;
      } else if (f.in_watchlist || f.in_wl1) {
        wl = `<div class="export-wl export-wl-orange">WL</div>`;
      }

      return `
        <div class="export-film">
          <div class="export-poster">${img}<div class="export-rank">#${i+1}</div>${wl}</div>
          <div class="export-film-title">${title}${year}</div>
          ${score ? `<div class="export-film-meta">${score}</div>` : ''}
        </div>`;
    }).join('');

    return `
      <div class="export-controls">
        <button class="export-ctrl-btn" id="btn-png" onclick="downloadPNG()">Save as PNG</button>
        <button class="export-ctrl-btn" onclick="closeExport()">✕ Close</button>
      </div>
      <div class="export-card" id="export-card">
        <div class="export-header">
          <div class="export-logo">MATCH<span style="color:${accent}">BOXD</span></div>
          <div class="export-header-right">
            <div class="export-badge" style="background:${accent};color:${badgeFg}">${mode}</div>
            <div class="export-subtitle">for ${label}</div>
          </div>
        </div>
        <div class="export-grid">${cards}</div>
        <div class="export-footer">
          <span>made with ♡ by kopliku.dev</span>
          <span>${date}</span>
        </div>
      </div>`;
  }

  async function downloadPNG() {
    const card = document.getElementById('export-card');
    const btn  = document.getElementById('btn-png');
    if (!card || !btn) return;
    btn.textContent = 'Generating…';
    btn.disabled = true;
    try {
      const canvas = await html2canvas(card, {
        useCORS: true, scale: 2,
        backgroundColor: '#f0ede6', logging: false,
      });
      const data  = window.__exportData;
      const label = data.user2 ? `${data.user1}-${data.user2}` : data.user1;
      const a = document.createElement('a');
      a.download = `matchboxd-${label}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    } catch {
      alert('PNG export failed. Please try again.');
    } finally {
      btn.textContent = 'Save as PNG';
      btn.disabled = false;
    }
  }
  // ────────────────────────────────────────────────────────────────────

  function renderProfile(data) {
    const el = document.getElementById("profile");
    if (!el) return;

    const LB_LOGO = `<svg width="18" height="18" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="display:inline-block;vertical-align:middle;flex-shrink:0"><circle fill="#FFFFFF" cx="250" cy="250" r="250"/><g transform="translate(61,180)"><ellipse fill="#00E054" cx="189" cy="69.97" rx="70.08" ry="69.97"/><ellipse fill="#40BCF4" cx="307.92" cy="69.97" rx="70.08" ry="69.97"/><ellipse fill="#FF8000" cx="70.08" cy="69.97" rx="70.08" ry="69.97"/><path d="M129.54,107.02 C122.81,96.28 118.92,83.58 118.92,69.97 C118.92,56.37 122.81,43.67 129.54,32.92 C136.27,43.67 140.16,56.37 140.16,69.97 C140.16,83.58 136.27,96.28 129.54,107.02 Z" fill="#556677"/><path d="M248.46,32.92 C255.19,43.67 259.08,56.37 259.08,69.97 C259.08,83.58 255.19,96.28 248.46,107.02 C241.73,96.28 237.84,83.58 237.84,69.97 C237.84,56.37 241.73,43.67 248.46,32.92 Z" fill="#556677"/></g></svg>`;

    function profileCard(username, p) {
      if (!p || !Object.keys(p).length) return "";

      const genreTags = (p.top_genres || []).slice(0, 5)
        .map(g => `<span class="profile-genre-tag">${g}</span>`).join("");

      const runtimeLabel = { short: "Short films", standard: "Standard runtime", long: "Long films" };
      const decadeVal    = p.top_decade ? `Loves the ${p.top_decade}s` : "—";
      const avgStars     = p.avg_rating ? `★ ${p.avg_rating.toFixed(1)} avg` : "—";
      const intlVal      = p.intl_pct != null ? `${Math.round(p.intl_pct * 100)}% international` : "—";
      const runtimeVal   = runtimeLabel[p.runtime_pref] || "—";
      const wlLabel      = p.watchlist_size ? `${p.watchlist_size} on watchlist` : "—";

      const stats = [
        `<div class="profile-stat-row"><span class="profile-stat-label">Rating</span>${avgStars}</div>`,
        `<div class="profile-stat-row"><span class="profile-stat-label">Prefers</span>${runtimeVal}</div>`,
        `<div class="profile-stat-row"><span class="profile-stat-label">Era</span>${decadeVal}</div>`,
        `<div class="profile-stat-row"><span class="profile-stat-label">Watches</span>${intlVal}</div>`,
        `<div class="profile-stat-row"><span class="profile-stat-label">Watchlist</span>${wlLabel}</div>`,
      ].join("");

      const lbUrl = `https://letterboxd.com/${encodeURIComponent(username)}/`;

      const favs = (p.favorites || []).filter(f => f.poster_url).slice(0, 4);
      const favsHtml = favs.map(f =>
        `<div class="profile-fav"><img src="${f.poster_url}" alt="${f.name}" title="${f.name} (${f.year})" loading="lazy"></div>`
      ).join("");

      return `
        <div class="profile-card">
          <div class="profile-username">
            <span>${username}</span>
            <span style="display:flex;align-items:center;gap:0.5rem">
              <span class="profile-filmcount">${p.total_films} films rated</span>
              <a href="${lbUrl}" target="_blank" rel="noopener noreferrer" title="View on Letterboxd" style="display:flex;align-items:center;line-height:1">${LB_LOGO}</a>
            </span>
          </div>
          <div class="profile-body">
            <div class="profile-left">
              ${genreTags ? `<div class="profile-genres">${genreTags}</div>` : ""}
              <div class="profile-stats">${stats}</div>
            </div>
            ${favs.length ? `<div class="profile-favs">${favsHtml}</div>` : ""}
          </div>
        </div>`;
    }

    if (data.user2 && data.blend_score) {
      const bs     = data.blend_score;
      const color  = bs.total >= 75 ? 'var(--green)' : bs.total >= 50 ? 'var(--accent)' : '#e05050';
      const flavor = bs.total >= 75 ? 'Great match!'
                   : bs.total >= 55 ? 'Solid overlap'
                   : bs.total >= 40 ? 'Some common ground'
                   : 'Very different tastes';
      const sharedTags = (bs.shared_genres || []).map(g =>
        `<span class="blend-score-tag">${g}</span>`).join("") || '<span style="font-family:\'Space Mono\',monospace;font-size:0.5rem;color:#aaa">none</span>';

      const overlapLine = bs.films_both_rated > 0
        ? `<div class="blend-score-stat-row"><span class="blend-score-stat-label">Both seen</span>${bs.films_both_rated} films</div>`
        : "";
      const lovedLine = bs.films_both_loved > 0
        ? `<div class="blend-score-stat-row"><span class="blend-score-stat-label">Both loved</span>${bs.films_both_loved} films</div>`
        : "";
      const method = bs.films_both_rated >= 5
        ? "Based on shared ratings + genres, era &amp; taste signals."
        : "Based on genres, era &amp; taste signals. Rate more films for a deeper score.";

      const scoreCard = `
        <div class="blend-score-card">
          <div class="blend-score-label">Blend Score</div>
          <div class="blend-score-main">
            <div class="blend-score-left">
              <div class="blend-score-number" style="color:${color}">${bs.total}</div>
              <div class="blend-score-denom">/ 100</div>
            </div>
            <div class="blend-score-right">
              ${(bs.shared_genres||[]).length ? `<div>
                <div class="blend-score-shared-label">Shared genres</div>
                <div class="blend-score-shared" style="margin-top:3px">${sharedTags}</div>
              </div>` : ""}
              ${overlapLine || lovedLine ? `<div>${overlapLine}${lovedLine}</div>` : ""}
            </div>
          </div>
          <div class="blend-score-flavor">${flavor}</div>
          <div class="blend-score-method">${method}</div>
        </div>`;

      el.innerHTML = `
        <div class="blend-layout">
          <div class="blend-profiles-col">
            ${profileCard(data.user1, data.profile1)}
            ${profileCard(data.user2, data.profile2)}
          </div>
          ${scoreCard}
        </div>`;
    } else {
      el.innerHTML = `<div class="profile-wrap">${profileCard(data.user1, data.profile1)}</div>`;
    }
    el.classList.add("visible");
  }

  function renderResults(data) {
    window.__exportData = data;
    const u1 = data.user1, u2 = data.user2;
    const isBlend = !!u2;
    const label = isBlend ? `${u1} + ${u2}` : u1;
    let html = "";
    html += `<div style="display:flex;justify-content:space-between;align-items:center;margin:2rem 0 1rem">`;
    html += `<div class="section-title" style="margin:0">Recommendations <span class="section-count">for ${label}</span></div>`;
    html += `<button class="btn-export" onclick="openExport()">Export</button>`;
    html += `</div>`;
    html += `<div class="grid">`;
    data.recommendations.forEach((f, i) => { html += filmCard(f, i + 1, u1, u2, isBlend); });
    html += `</div>`;
    if (data.both_watchlist && data.both_watchlist.length > 0) {
      html += `<div class="section-title">Both watchlists <span class="section-count">${data.both_watchlist.length} films</span></div>`;
      html += `<div class="grid">`;
      data.both_watchlist.forEach(f => { html += filmCard(f, null, u1, u2, isBlend); });
      html += `</div>`;
    }
    document.getElementById("results").innerHTML = html;
    buildDecadeFilter(data.recommendations);
    buildGenreFilter(data.recommendations);
    document.getElementById("results").scrollIntoView({ behavior: "smooth", block: "start" });
  }
</script>
</body>
</html>
